<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>biotech-atlas explorer</title>
<style>
:root{--bg:#fbfaf8;--card:#fff;--text:#1b1b1a;--muted:#6b6b66;--line:#e7e4de;--accent:#4f7cc9;--hover:#f0eee9}
@media(prefers-color-scheme:dark){:root{--bg:#161615;--card:#201f1e;--text:#ededec;--muted:#9a9a94;--line:#33322e;--accent:#6f97d8;--hover:#2a2926}}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font:15px/1.5 -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
header{position:sticky;top:0;z-index:5;display:flex;gap:14px;align-items:center;flex-wrap:wrap;
  padding:12px 20px;background:var(--card);border-bottom:1px solid var(--line)}
header h1{font-size:17px;font-weight:600;margin:0}
header h1 span{color:var(--muted);font-weight:400}
.backbtn{border:1px solid var(--line);background:var(--card);color:var(--text);border-radius:8px;
  padding:6px 12px;cursor:pointer;font-size:13px}
.backbtn:hover{background:var(--hover)}
.toggle{display:flex;border:1px solid var(--line);border-radius:8px;overflow:hidden}
.toggle button{border:0;background:transparent;color:var(--muted);padding:6px 12px;cursor:pointer;font-size:13px}
.toggle button.on{background:var(--accent);color:#fff}
#search{flex:1;min-width:200px;max-width:440px;padding:8px 12px;border:1px solid var(--line);border-radius:8px;
  background:var(--bg);color:var(--text);font-size:14px}
.wrap{display:grid;grid-template-columns:320px 1fr;gap:18px;padding:18px 20px;max-width:1200px;margin:0 auto}
@media(max-width:820px){.wrap{grid-template-columns:1fr}}
.card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:16px}
.card h2{font-size:12px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);margin:0 0 10px;font-weight:600}
.hrow{display:flex;justify-content:space-between;align-items:center;gap:10px}
.hrow h2{margin:0}
.tiles{display:flex;flex-wrap:wrap;gap:8px}
.tile{flex:1;min-width:78px;background:var(--bg);border:1px solid var(--line);border-radius:9px;padding:8px 10px}
.tile b{font-size:19px;font-weight:600;display:block}
.tile span{font-size:11px;color:var(--muted)}
.lnk{color:var(--accent);cursor:pointer;text-decoration:none}
.lnk:hover{text-decoration:underline}
.row{display:flex;align-items:center;gap:8px;padding:4px 6px;border-radius:6px;font-size:13.5px}
.row:hover{background:var(--hover)}
.row .n{margin-left:auto;color:var(--muted);font-variant-numeric:tabular-nums;font-size:12.5px}
.track{height:6px;border-radius:4px;background:rgba(128,128,128,.16);flex:1;max-width:120px;overflow:hidden}
.fill{height:100%;background:var(--accent);border-radius:4px}
.detail h2{font-size:22px;font-weight:600;margin:0 0 2px}
.detail .sub{color:var(--muted);font-size:13px;margin:0 0 18px}
.pill{display:inline-block;background:var(--bg);border:1px solid var(--line);border-radius:20px;
  padding:3px 11px;font-size:12.5px;margin:0 6px 6px 0}
.chips{display:flex;gap:6px;flex-wrap:wrap;margin:0 0 10px}
.chip{border:1px solid var(--line);background:var(--bg);color:var(--muted);border-radius:16px;
  padding:3px 11px;font-size:12px;cursor:pointer;user-select:none}
.chip.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.xbtn{border:1px solid var(--line);background:var(--card);color:var(--muted);border-radius:7px;
  padding:4px 10px;cursor:pointer;font-size:12px;white-space:nowrap}
.xbtn:hover{color:var(--text);background:var(--hover)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:680px){.grid2{grid-template-columns:1fr}}
table{width:100%;border-collapse:collapse;font-size:13.5px}
th,td{text-align:left;padding:5px 8px;border-bottom:1px solid var(--line)}
th{color:var(--muted);font-weight:500;font-size:11.5px;text-transform:uppercase;letter-spacing:.03em}
td .n,td.n{color:var(--muted);font-variant-numeric:tabular-nums}
.muted{color:var(--muted)}
.empty{color:var(--muted);font-size:13px;padding:8px 0}
.hint{color:var(--muted);font-size:13px}
.gwrap{width:100%;overflow-x:auto}
.gnode{cursor:pointer}
.gnode:hover text{fill:var(--accent)}
</style>
</head>
<body>
<header>
  <h1>biotech-atlas <span>explorer</span></h1>
  <button id="back" class="backbtn" style="display:none">← back</button>
  <div class="toggle" id="dbtoggle">
    <button data-db="census" class="on">census · industry</button>
    <button data-db="curated">curated · 45</button>
  </div>
  <input id="search" placeholder="search companies, drugs, targets, diseases…" autocomplete="off">
</header>
<div class="wrap">
  <aside id="side"></aside>
  <main id="main" class="card detail"><p class="hint">Loading…</p></main>
</div>
<script>
const S = { db:"census", hist:[], cur:null, company:null, cmod:null, phases:[] };
const $ = (s,el=document)=>el.querySelector(s);
const esc = s => String(s??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const api = (p,q={}) => fetch(`/api/${p}?`+new URLSearchParams({db:S.db,...q})).then(r=>r.json());
const fmtMoney = v => { const a=Math.abs(v), s=v<0?"−":"";
  return a>=1e9?`${s}$${(a/1e9).toFixed(1)}B`:a>=1e6?`${s}$${(a/1e6).toFixed(0)}M`:`${s}$${Math.round(a)}`; };
const FIN = {revenue:["Revenue",0], rd_expense:["R&D",1], cash:["Cash",2], net_income:["Net income",3]};
const cLink = n => `<a class="lnk" data-kind="company" data-name="${esc(n)}">${esc(n)}</a>`;
const tLink = (id,n) => `<a class="lnk" data-kind="target" data-id="${id}" data-name="${esc(n)}">${esc(n)}</a>`;
const dLink = (id,n) => `<a class="lnk" data-kind="disease" data-id="${id}" data-name="${esc(n)}">${esc(n)}</a>`;
const aLink = (id,n) => `<a class="lnk" data-kind="asset" data-id="${id}" data-name="${esc(n)}">${esc(n)}</a>`;
function bars(items,val,mk){ const mx=Math.max(1,...items.map(i=>i[val]));
  return items.map(i=>`<div class="row">${mk(i)}<div class="track"><div class="fill" style="width:${100*i[val]/mx}%"></div></div><span class="n">${i[val]}</span></div>`).join("")||`<div class="empty">—</div>`; }

// ---- CSV export of the current view's main table ----
let CURTABLE = null;
function setTable(name,cols,rows){ CURTABLE = {name,cols,rows}; }
function csv(){ if(!CURTABLE) return; const q=s=>`"${String(s??"").replace(/"/g,'""')}"`;
  const L=[CURTABLE.cols.map(q).join(",")].concat(CURTABLE.rows.map(r=>r.map(q).join(",")));
  const b=new Blob([L.join("\n")],{type:"text/csv"}); const a=document.createElement("a");
  a.href=URL.createObjectURL(b); a.download=CURTABLE.name.replace(/[^a-z0-9]+/gi,"_")+".csv"; a.click(); URL.revokeObjectURL(a.href); }
const xbtn = `<button class="xbtn" onclick="csv()">↓ csv</button>`;

// ---- navigation with history ----
function go(v,push=true){ if(push && S.cur) S.hist.push(S.cur); S.cur=v; showBack(); render(v); }
function back(){ const v=S.hist.pop(); if(v){ S.cur=v; showBack(); render(v); } }
function showBack(){ $("#back").style.display = S.hist.length ? "inline-flex":"none"; }
function render(v){ ({company:()=>renderCompany(v.name), target:()=>renderTarget(v.id),
  disease:()=>renderDisease(v.id), asset:()=>renderAsset(v.id), search:()=>renderSearch(v.q),
  home:renderHome}[v.t]||renderHome)(); }
function setMain(h){ const m=$("#main"); m.dataset.loaded=1; m.innerHTML=h; m.scrollIntoView({block:"nearest"}); }

async function loadSide(){
  const o = await api("overview"); const c = o.counts||{}; S.phases=o.phases||[];
  $("#side").innerHTML = `
   <div class="card"><h2>${S.db==="census"?"whole industry":"curated 45"}</h2>
     <div class="tiles">
       <div class="tile"><b>${c.companies??0}</b><span>companies</span></div>
       <div class="tile"><b>${c.trials??0}</b><span>trials</span></div>
       <div class="tile"><b>${c.assets??0}</b><span>assets</span></div>
       <div class="tile"><b>${c.targets??0}</b><span>targets</span></div>
       <div class="tile"><b>${c.diseases??0}</b><span>diseases</span></div>
     </div></div>
   <div class="card"><h2>top companies</h2>${bars(o.companies,"n",i=>cLink(i.org))}</div>
   <div class="card"><h2>top targets</h2>${bars(o.targets,"n",i=>tLink(i.id,i.name))}</div>
   <div class="card"><h2>top diseases (MONDO)</h2>${bars(o.diseases,"n",i=>dLink(i.id,i.label))}</div>`;
  if(!$("#main").dataset.loaded){ renderHome(); S.cur={t:"home"}; }
}
function renderHome(){
  CURTABLE=null;
  setMain(`<h2>Explore the oncology graph</h2>
    <p class="sub">Search above, or click any company, target or disease. Everything drills down through the graph.</p>
    <div class="card" style="margin:0"><h2>trials by phase</h2>
      ${bars((S.phases||[]).slice(0,9),"n",i=>`<span>${esc(i.phase)}</span>`)}</div>`);
}

// ---- company ----
function drugsTable(assets,mod){
  const r = mod ? assets.filter(a=>(a.modality||"")===mod) : assets;
  setTable("drugs", ["drug","modality","trials"], r.map(a=>[a.name,a.modality||"",a.trials]));
  return `<table><thead><tr><th>drug</th><th>modality</th><th class="n">trials</th></tr></thead><tbody>
    ${r.map(a=>`<tr><td>${aLink(a.id,a.name)}</td><td class="muted">${esc(a.modality||"—")}</td><td class="n">${a.trials}</td></tr>`).join("")||`<tr><td class="empty">no drugs</td></tr>`}</tbody></table>`;
}
function setMod(m){ S.cmod = (S.cmod===m?null:m);
  document.querySelectorAll("#modchips .chip").forEach(c=>c.classList.toggle("on",c.dataset.m===S.cmod));
  $("#drugs").innerHTML = drugsTable(S.company.assets||[], S.cmod); }
async function renderCompany(name){
  const d = await api("company",{name}); S.company=d; S.cmod=null;
  const fin = (d.financials||[]).slice().sort((a,b)=>FIN[a.metric][1]-FIN[b.metric][1]);
  const mods = [...new Set((d.assets||[]).map(a=>a.modality).filter(Boolean))];
  setMain(`<h2>${esc(name)}</h2><p class="sub">${d.trials} oncology trials led · company</p>
    ${fin.length?`<div class="card"><h2>financials · SEC EDGAR</h2>
      ${fin.map(f=>`<span class="pill">${FIN[f.metric][0]}: <b>${fmtMoney(f.value)}</b> <span class="muted">FY${String(f.fiscal_year).slice(2)}</span></span>`).join("")}
      <div class="muted" style="font-size:11.5px;margin-top:6px">CIK ${esc(d.cik||"")} · latest annual XBRL filing</div></div>`:""}
    <div class="grid2">
      <div><div class="card"><div class="hrow"><h2>drugs in its trials <span style="text-transform:none;font-weight:400">(incl. combos)</span></h2>${xbtn}</div>
        ${mods.length>1?`<div class="chips" id="modchips">${mods.map(m=>`<span class="chip" data-m="${esc(m)}" onclick="setMod('${esc(m)}')">${esc(m)}</span>`).join("")}</div>`:""}
        <div id="drugs">${drugsTable(d.assets||[],null)}</div></div></div>
      <div>
        <div class="card"><h2>phases</h2>${bars(d.phases||[],"n",i=>`<span>${esc(i.phase)}</span>`)}</div>
        <div class="card"><h2>top targets</h2>${bars(d.targets||[],"assets",i=>tLink(i.id,i.name))}</div>
        <div class="card"><h2>top diseases</h2>${bars(d.diseases||[],"trials",i=>dLink(i.id,i.label))}</div>
      </div></div>`);
}

// ---- target (with neighborhood graph) ----
function targetGraph(t){
  const A=(t.assets||[]).slice(0,9); if(A.length<2) return "";
  const cx=200,cy=158,R=118;
  const N=A.map((a,i)=>{ const ang=-Math.PI/2+2*Math.PI*i/A.length;
    return {a,x:cx+R*Math.cos(ang),y:cy+R*Math.sin(ang)}; });
  const lines=N.map(n=>`<line x1="${cx}" y1="${cy}" x2="${n.x.toFixed(0)}" y2="${n.y.toFixed(0)}" stroke="var(--line)" stroke-width="1.5"/>`).join("");
  const nodes=N.map(n=>{ const left=n.x<cx-2, tx=left?n.x-9:n.x+9, anc=left?"end":"start";
    return `<g class="lnk gnode" data-kind="asset" data-id="${n.a.id}" data-name="${esc(n.a.name)}">
      <circle cx="${n.x.toFixed(0)}" cy="${n.y.toFixed(0)}" r="6" fill="var(--accent)"/>
      <text x="${tx.toFixed(0)}" y="${(n.y+4).toFixed(0)}" text-anchor="${anc}" font-size="11" fill="var(--text)">${esc(n.a.name.slice(0,20))}</text></g>`; }).join("");
  return `<div class="card"><h2>neighborhood — drugs on this target</h2><div class="gwrap">
    <svg viewBox="0 0 400 320" width="100%" style="max-width:540px" role="img">${lines}
    <circle cx="${cx}" cy="${cy}" r="24" fill="var(--accent)"/>
    <text x="${cx}" y="${cy+4}" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">${esc(t.name.slice(0,8))}</text>
    ${nodes}</svg></div></div>`;
}
async function renderTarget(id){
  const t = await api("target",{id}); const A=t.assets||[];
  setTable("target_"+(t.name||id), ["drug","modality","company"], A.map(a=>[a.name,a.modality||"",a.company||""]));
  setMain(`<h2>${esc(t.name)}</h2><p class="sub">target · ${esc(t.ensembl_id||"")} · ${A.length} drugs act on it</p>
    ${targetGraph(t)}
    <div class="card"><div class="hrow"><h2>drugs targeting ${esc(t.name)}</h2>${xbtn}</div>
      <table><thead><tr><th>drug</th><th>modality</th><th>company</th></tr></thead><tbody>
      ${A.map(a=>`<tr><td>${aLink(a.id,a.name)}</td><td class="muted">${esc(a.modality||"—")}</td><td>${a.company?cLink(a.company):'<span class="muted">—</span>'}</td></tr>`).join("")||`<tr><td class="empty">—</td></tr>`}
      </tbody></table></div>`);
}

// ---- disease ----
async function renderDisease(id){
  const d = await api("disease",{id});
  setTable("disease_"+(d.label||id), ["asset","trials"], (d.assets||[]).map(a=>[a.name,a.n]));
  setMain(`<h2>${esc(d.label)}</h2><p class="sub">disease · ${esc(d.mondo_id||"")}</p>
    <div class="grid2">
      <div class="card"><h2>top companies</h2>${bars(d.companies||[],"n",i=>cLink(i.org))}</div>
      <div class="card"><div class="hrow"><h2>top proprietary assets</h2>${xbtn}</div>${bars(d.assets||[],"n",i=>aLink(i.id,i.name))}</div>
    </div>`);
}

// ---- asset ----
async function renderAsset(id){
  const a = await api("asset",{id}); CURTABLE=null;
  setMain(`<h2>${esc(a.name)}</h2><p class="sub">drug / asset · ${a.trials} trials</p>
    <div><span class="pill">modality: ${esc(a.modality||"unknown")}</span>
      <span class="pill">role: ${esc(a.role||"—")}</span>
      ${a.chembl_id?`<span class="pill">${esc(a.chembl_id)}</span>`:""}</div>
    <div class="grid2" style="margin-top:14px">
      <div class="card"><h2>targets</h2>${(a.targets||[]).map(t=>tLink(t.id,t.name)).join(" · ")||'<span class="empty">—</span>'}</div>
      <div class="card"><h2>developed by</h2>${(a.companies||[]).map(c=>cLink(c.org)).join(" · ")||'<span class="empty">—</span>'}</div>
    </div>
    <div class="card"><h2>indications</h2>${(a.indications||[]).map(i=>esc(i.ind)).join(" · ")||'<span class="empty">—</span>'}</div>`);
}

// ---- search ----
async function renderSearch(q){
  const r = await api("search",{q}); CURTABLE=null;
  const sec=(t,items,html)=>`<div class="card"><h2>${t}</h2>${items.length?items.map(html).join(""):'<div class="empty">no matches</div>'}</div>`;
  setMain(`<h2>Search</h2><p class="sub">“${esc(q)}”</p>
    ${sec("companies",r.companies,i=>`<div class="row">${cLink(i.org)}</div>`)}
    ${sec("drugs / assets",r.assets,i=>`<div class="row">${aLink(i.id,i.name)}<span class="n">${esc(i.modality||"")}</span></div>`)}
    ${sec("targets",r.targets,i=>`<div class="row">${tLink(i.id,i.name)}</div>`)}
    ${sec("diseases",r.diseases,i=>`<div class="row">${dLink(i.id,i.label)}</div>`)}`);
}

// ---- events ----
document.addEventListener("click", e=>{
  const a = e.target.closest(".lnk"); if(!a) return;
  e.preventDefault();
  go({t:a.dataset.kind, id:a.dataset.id, name:a.dataset.name});
});
$("#back").addEventListener("click", back);
$("#dbtoggle").addEventListener("click", e=>{
  const b=e.target.closest("button"); if(!b) return;
  S.db=b.dataset.db; S.hist=[]; S.cur=null;
  [...$("#dbtoggle").children].forEach(x=>x.classList.toggle("on",x===b));
  $("#main").dataset.loaded=""; showBack(); loadSide();
});
let tm; $("#search").addEventListener("input", e=>{ clearTimeout(tm); const q=e.target.value;
  tm=setTimeout(()=>{ if(q.trim()) go({t:"search",q}); }, 250); });
$("#search").addEventListener("keydown", e=>{ if(e.key==="Enter"){ clearTimeout(tm);
  const q=e.target.value; if(q.trim()) go({t:"search",q}); } });

loadSide();
</script>
</body>
</html>
